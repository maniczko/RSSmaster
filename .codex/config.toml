model = "gpt-5.4"
model_reasoning_effort = "xhigh"
approval_policy = "never"
project_doc_fallback_filenames = ["AGENTS.md"]
project_root_markers = [".git", "package.json", "AGENTS.md"]

developer_instructions = """
RSSmaster project defaults:

- Preferred verification commands:
  - UI, layout, reader, search: `npm run build`, `npm run test:unit:web`, then browser verification
  - API, contract, ranking, source ops: `python scripts/test_api_unit.py`, `python scripts/check_api.py`
  - Startup, diagnostics, config: `python scripts/check_health.py`
  - Release confidence: `npm run check`, `npm run health`
- Prefer RSSmaster skills when relevant:
  - `rssmaster-reader-ux`
  - `rssmaster-debug-playbook`
  - `rssmaster-api-contract-guardian`
  - `rssmaster-playwright-e2e`
  - `rssmaster-release-qa`
  - `rssmaster-semantic-ranking-v4`
  - `rssmaster-feed-ops-and-health`
  - `rssmaster-design-system-polish`
  - `rssmaster-localization-pl`
  - `rssmaster-release-incident-response`
- Do not edit SQLite files under `data/` by hand.
- Do not commit runtime artifacts, logs, `.next/`, `output/`, or generated build junk.
- Keep the default local ports at `127.0.0.1:3000` and `127.0.0.1:8000` unless the task explicitly changes runtime docs and verification.
- Update docs when API, orchestration, storage, startup, or operator behavior changes.
"""

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[features]
multi_agent = true
